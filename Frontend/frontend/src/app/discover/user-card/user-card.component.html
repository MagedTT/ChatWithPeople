<article class="user-card">

    <!-- Avatar -->
    <div class="avatar-wrap">
        <!-- <div class="avatar" [style.background]="user().avatarBg" [style.color]="user().avatarColor"> -->
        <div class="avatar" [style.background]="true" [style.color]="true">
            {{ initials() }}
        </div>
        <!-- @if (user().isOnline) { -->
        @if (true) {
        <span class="online-dot" aria-label="Online"></span>
        }
    </div>

    <!-- Info -->
    <div class="card-info">
        <h3 class="user-name">{{ "user().firstName" }} {{ "user().lastName" }}</h3>

        <!-- @if (user().location) { -->
        @if (true) {
        <p class="user-location">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z" />
                <circle cx="12" cy="10" r="3" />
            </svg>
            {{ "user().location" }}
        </p>
        }

        <!-- @if (user().interest) { -->
        @if (true) {
        <span class="interest-tag">{{ "user().interest" }}</span>
        }

        <!-- @if (user().mutualFriends && user().mutualFriends! > 0) { -->
        @if (true) {
        <p class="mutual">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
                <circle cx="9" cy="7" r="4" />
                <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
                <path d="M16 3.13a4 4 0 0 1 0 7.75" />
            </svg>
            {{ "user().mutualFriends" }} mutual {{ "user().mutualFriends === 1 ? 'friend' : 'friends'" }}
        </p>
        }
    </div>

    <!-- Actions -->
    <div class="card-actions">
        <button class="btn btn-primary" [class.sent]="requestSent()" [disabled]="requestSent()" (click)="onAddFriend()">
            @if (requestSent()) {
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12" />
            </svg>
            Sent
            } @else {
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />
                <circle cx="9" cy="7" r="4" />
                <line x1="19" y1="8" x2="19" y2="14" />
                <line x1="22" y1="11" x2="16" y2="11" />
            </svg>
            Add friend
            }
        </button>

        <button class="btn btn-ghost" (click)="onMessage()">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
            </svg>
            Message
        </button>
    </div>

</article>
