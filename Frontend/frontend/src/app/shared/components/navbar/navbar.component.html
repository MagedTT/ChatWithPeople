<nav class="navbar">

    <!-- Brand -->
    <a class="brand" routerLink="/discover">
        <!-- <span class="brand-mark"></span> -->
        <span class="brand-name">Chatly</span>
    </a>

    <!-- Nav Links -->
    <ul class="nav-links">
        @for (link of navLinks; track link.path) {
        <li>
            <a class="nav-link" [routerLink]="link.path" routerLinkActive="active"
                [routerLinkActiveOptions]="{ exact: false }">
                {{ link.label }}
            </a>
        </li>
        }
    </ul>

    <!-- Right Side -->
    <div class="nav-right">

        <!-- Notification Bell -->
        <div class="notif-wrapper">
            <button class="icon-btn notif-trigger" [class.active]="notifPanelOpen()" (click)="toggleNotifPanel()"
                aria-label="Notifications">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
                    <path d="M13.73 21a2 2 0 0 1-3.46 0" />
                </svg>
                <!-- @if (hasUnread()) {
                <span class="notif-badge">{{ unreadCount() > 9 ? '9+' : unreadCount() }}</span>
                } -->
            </button>

            <!-- Notification Panel -->
            @if (notifPanelOpen()) {
            <div class="notif-panel">
                <div class="panel-header">
                    <span class="panel-title">Notifications</span>
                    <!-- @if (hasUnread()) {
                    <span class="panel-count">{{ unreadCount() }} new</span>
                    } -->
                </div>
                <ul class="notif-list">
                    <!-- @for (notif of notifications(); track notif.id) {
                    <li class="notif-item" [class.unread]="!notif.read">
                        <div class="notif-avatar" [style.background]="notif.avatarBg" [style.color]="notif.avatarColor">
                            {{ notif.initials }}
                        </div>
                        <div class="notif-body">
                            <p class="notif-text">
                                <strong>{{ notif.actorName }}</strong> {{ notif.message }}
                            </p>
                            <time class="notif-time">{{ notif.timeAgo }}</time>
                        </div>
                        @if (!notif.read) {
                        <span class="unread-dot"></span>
                        }
                    </li>
                    } @empty {
                    <li class="notif-empty">You're all caught up ✓</li>
                    } -->
                </ul>
                <a class="panel-footer" routerLink="/notifications">View all notifications</a>
            </div>
            }
        </div>

        <div class="divider"></div>

        <!-- User Menu -->
        <div class="user-menu-wrapper">
            <button class="user-menu-trigger" [class.active]="userMenuOpen()" (click)="toggleUserMenu()"
                aria-label="User menu">
                <div class="user-avatar">{{ userInitials() }}</div>
                <svg class="chevron" [class.rotated]="userMenuOpen()" width="12" height="12" viewBox="0 0 24 24"
                    fill="none" stroke="currentColor" stroke-width="2.5">
                    <polyline points="6 9 12 15 18 9" />
                </svg>
            </button>

            @if (userMenuOpen()) {
            <div class="user-dropdown">
                <div class="dropdown-user">
                    <div class="dropdown-avatar">{{ userInitials() }}</div>
                    <div>
                        <!-- <p class="dropdown-name">{{ currentUser()?.firstName }} {{ currentUser()?.lastName }}</p>
                        <p class="dropdown-email">{{ currentUser()?.email }}</p> -->
                    </div>
                </div>
                <div class="dropdown-divider"></div>
                <a class="dropdown-item" routerLink="/profile">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                        <circle cx="12" cy="7" r="4" />
                    </svg>
                    My profile
                </a>
                <a class="dropdown-item" routerLink="/settings">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="3" />
                        <path
                            d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
                    </svg>
                    Settings
                </a>
                <div class="dropdown-divider"></div>
                <button class="dropdown-item logout" (click)="logout()">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                        <polyline points="16 17 21 12 16 7" />
                        <line x1="21" y1="12" x2="9" y2="12" />
                    </svg>
                    Log out
                </button>
            </div>
            }
        </div>

    </div>
</nav>
