<div class="d-flex align-items-center justify-content-center min-vh-100 p-3" style="background-color: #141414;">

    <div class="card border border-secondary border-opacity-25 shadow-lg p-4 p-md-5"
        style="background-color: #1e1e1e; border-radius: 24px; width: 100%; max-width: 520px;">

        <!-- Logo -->
        <div class="d-flex align-items-center mb-4">
            <div class="bg-primary rounded-3 d-flex align-items-center justify-content-center me-2"
                style="width: 32px; height: 32px;">
                <i class="bi bi-chat-fill text-white"></i>
            </div>
            <h4 class="text-white fw-bold mb-0">Chatly</h4>
        </div>

        <!-- Heading -->
        <h2 class="text-white fw-bold mb-2">Create your account</h2>
        <p class="text-secondary mb-4">Join thousands of people already connecting</p>

        <!-- Social Buttons -->
        <div class="row g-3 mb-4">
            <div class="col-6">
                <button
                    class="btn btn-outline-secondary border-secondary border-opacity-25 text-white w-100 py-2 rounded-3 d-flex align-items-center justify-content-center gap-2"
                    style="background-color: #262626;">
                    <svg xmlns="http://w3.org" width="24" height="24" viewBox="0 0 48 48">
                        <path fill="#EA4335"
                            d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z" />
                        <path fill="#4285F4"
                            d="M46.64 24.55c0-1.65-.15-3.23-.42-4.75H24v9h12.75c-.55 2.87-2.17 5.3-4.61 6.94l7.19 5.58c4.21-3.88 6.64-9.6 6.64-16.27z" />
                        <path fill="#FBBC05"
                            d="M10.54 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.98-6.19z" />
                        <path fill="#34A853"
                            d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.19-5.58c-2.21 1.48-5.02 2.36-8.7 2.36-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z" />
                        <path fill="none" d="M0 0h48v48H0z" />
                    </svg>
                    Google
                </button>
            </div>
            <div class="col-6">
                <button
                    class="btn btn-outline-secondary border-secondary border-opacity-25 text-white w-100 py-2 rounded-3 d-flex align-items-center justify-content-center gap-2"
                    style="background-color: #262626;">
                    <svg xmlns="http://w3.org" width="24" height="24" viewBox="0 0 24 24">
                        <path fill="#1877F2"
                            d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.469h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.469h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z" />
                    </svg>
                    Facebook
                </button>
            </div>
        </div>

        <!-- Divider -->
        <div class="d-flex align-items-center mb-4">
            <hr class="flex-grow-1 border-secondary border-opacity-25">
            <span class="mx-3 text-secondary small text-uppercase" style="font-size: 0.7rem;">or sign up with
                email</span>
            <hr class="flex-grow-1 border-secondary border-opacity-25">
        </div>

        <!-- Form -->
        <form>
            <!-- First and Last Name -->
            <div class="row g-3 mb-3">
                <div class="col-6">
                    <label class="form-label text-secondary small fw-bold text-uppercase">First Name</label>
                    <input type="text"
                        class="form-control bg-dark border-secondary border-opacity-25 text-white py-2 px-3 shadow-none"
                        placeholder="First Name" style="background-color: #313131 !important; border-radius: 12px;">
                </div>
                <div class="col-6">
                    <label class="form-label text-secondary small fw-bold text-uppercase">Last Name</label>
                    <input type="text"
                        class="form-control bg-dark border-secondary border-opacity-25 text-white py-2 px-3 shadow-none"
                        placeholder="Last Name" style="background-color: #313131 !important; border-radius: 12px;">
                </div>
            </div>

            <!-- Email -->
            <div class="mb-3">
                <label class="form-label text-secondary small fw-bold text-uppercase">Email Address</label>
                <input type="email"
                    class="form-control bg-dark border-secondary border-opacity-25 text-white py-2 px-3 shadow-none"
                    placeholder="example@gmail.com" style="background-color: #313131 !important; border-radius: 12px;">
            </div>

            <!-- Password -->
            <div class="mb-3">
                <label class="form-label text-secondary small fw-bold text-uppercase">Password</label>
                <div class="input-group">
                    <input type="password"
                        class="form-control bg-dark border-secondary border-opacity-25 text-white py-2 px-3 shadow-none"
                        placeholder="Min. 8 characters"
                        style="background-color: #313131 !important; border-top-left-radius: 12px; border-bottom-left-radius: 12px;">
                    <span class="input-group-text bg-dark border-secondary border-opacity-25 text-secondary"
                        style="background-color: #313131 !important; border-top-right-radius: 12px; border-bottom-right-radius: 12px;">
                        <i class="bi bi-eye"></i>
                    </span>
                </div>
            </div>

            <!-- Confirm Password -->
            <div class="mb-3">
                <label class="form-label text-secondary small fw-bold text-uppercase">Confirm Password</label>
                <div class="input-group">
                    <input type="password"
                        class="form-control bg-dark border-secondary border-opacity-25 text-white py-2 px-3 shadow-none"
                        placeholder="Repeat password"
                        style="background-color: #313131 !important; border-top-left-radius: 12px; border-bottom-left-radius: 12px;">
                    <span class="input-group-text bg-dark border-secondary border-opacity-25 text-secondary"
                        style="background-color: #313131 !important; border-top-right-radius: 12px; border-bottom-right-radius: 12px;">
                        <i class="bi bi-eye"></i>
                    </span>
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-100 py-2 fw-bold mb-4 shadow" style="border-radius: 12px;">
                Create account
            </button>
        </form>

        <!-- Footer -->
        <p class="text-center text-secondary small mb-0">
            Already have an account? <a class="text-primary text-decoration-none fw-bold" style="cursor: pointer;"
                (click)="navigateToSignIn()">Sign
                in</a>
        </p>
    </div>
</div>
