<div class="d-flex flex-column gap-3" style="max-width: 800px;">
    <!-- User Card -->
    <div class="d-flex align-items-center p-3 rounded-4 border border-secondary border-opacity-25"
        style="background-color: #313131;">

        <!-- Avatar with Status -->
        <div class="position-relative me-3">
            <div class="rounded-circle d-flex align-items-center justify-content-center fw-bold text-dark overflow-hidden"
                style="width: 55px; height: 55px; background-color: #c5cae9;">

                @if (friend?.profilePicture) {
                <img [src]="getImageUrl(friend?.profilePicture)" [alt]="friend?.userName"
                    style="width: 100%; height: 100%; object-fit: cover;">
                } @else {
                {{ friend?.userName?.charAt(0) }}
                }
            </div>

            <!-- Status Dot based on friend.status -->
            <!-- <span class="position-absolute bottom-0 end-0 border border-2 border-dark rounded-circle"
                [class.bg-success]="friend?.status === 1" [class.bg-danger]="friend?.status !== 1"
                style="width: 14px; height: 14px; margin-bottom: 2px;"></span> -->
        </div>

        <!-- User Info -->
        <div class="flex-grow-1">
            <h6 class="mb-0 fw-bold">{{ friend?.userName }}</h6>
            @if (friend?.userStatus === 1) {
            <div class="small d-flex align-items-center text-success">
                <span class="me-1">●</span> Online
            </div>
            } @else if (friend?.userStatus === 2) {
            <div class="small d-flex align-items-center text-danger">
                <span class="me-1">●</span> Offline
            </div>
            }
            <div class="small text-secondary">Berlin, x</div>
        </div>

        <!-- Action Buttons -->
        <div class="d-flex gap-2 ms-3">
            <a class="btn btn-outline-secondary text-white rounded-pill px-3 py-1 border-opacity-50"
                (click)="navigateToConversation(friend?.friendId!)">Message</a>
            <!-- <button
                class="btn btn-outline-secondary text-white rounded-pill px-3 py-1 border-opacity-50">Profile</button> -->
            <button class="btn btn-outline-secondary text-danger rounded-pill px-3 py-1 border-opacity-50"
                (click)="removeFriend(friend?.friendId!)">Unfriend</button>
        </div>
    </div>
</div>
