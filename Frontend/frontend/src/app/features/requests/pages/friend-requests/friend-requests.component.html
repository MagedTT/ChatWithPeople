<div class="p-4 bg-dark text-white min-vh-100" style="background-color: #141414 !important;">
    <!-- Header -->
    <div class="mb-4">
        <h2 class="fw-bold mb-1">Friend requests</h2>
        <p class="text-secondary">Manage incoming and outgoing requests</p>
    </div>

    <!-- Tabs (Nav Pills) -->
    <app-received-sent-tabs (toggleReceivedSentButton)="onReceivedSentButtonClicked($event)"></app-received-sent-tabs>

    <!-- Request List -->
    @if (received) {
    <div class="d-flex flex-column gap-3" style="max-width: 800px;">

        <!-- Single Request Card (Repeat for each user) -->
        <div class="d-flex align-items-center p-3 rounded-4 border border-secondary border-opacity-25 shadow-sm"
            style="background-color: #313131;">

            <!-- Avatar -->
            <div class="rounded-circle d-flex align-items-center justify-content-center fw-bold text-dark me-3"
                style="width: 56px; height: 56px; background-color: #c5cae9; font-size: 1.1rem;">
                SR
            </div>

            <!-- Info -->
            <div class="flex-grow-1">
                <h6 class="mb-0 fw-bold">Sara Rossi</h6>
                <div class="small text-secondary">
                    Sent 2 minutes ago • 4 mutual friends
                </div>
            </div>

            <!-- Actions -->
            <div class="d-flex gap-2 ms-3">
                <button class="btn btn-outline-secondary text-white rounded-3 px-4 py-1 border-opacity-50"
                    style="font-size: 0.9rem;">
                    Accept
                </button>
                <button class="btn btn-outline-secondary text-white rounded-3 px-4 py-1 border-opacity-50"
                    style="font-size: 0.9rem;">
                    Decline
                </button>
            </div>
        </div>

        <!-- Repeat item for Kenji Aoki ... -->
    </div>
    } @else {
    <div class="d-flex flex-column gap-3" style="max-width: 800px;">

        <!-- Sent Request Card -->
        <div class="d-flex align-items-center p-3 rounded-4 border border-secondary border-opacity-25 shadow-sm"
            style="background-color: #313131;">

            <!-- Avatar -->
            <div class="rounded-circle d-flex align-items-center justify-content-center fw-bold text-dark me-3"
                style="width: 56px; height: 56px; background-color: #c8e6c9; font-size: 1.1rem;">
                PK
            </div>

            <!-- User Info -->
            <div class="flex-grow-1">
                <h6 class="text-white mb-0 fw-bold">Priya Kapoor</h6>
                <div class="small text-secondary">Sent 1 day ago</div>
            </div>

            <!-- Actions Area -->
            <div class="d-flex align-items-center gap-3 ms-3">
                <!-- Pending Badge -->
                <span
                    class="badge rounded-pill px-3 py-2 bg-dark text-secondary fw-normal border border-secondary border-opacity-25"
                    style="background-color: #1e1e1e !important; font-size: 0.85rem;">
                    Pending
                </span>

                <!-- Cancel Button -->
                <button class="btn btn-outline-secondary text-white rounded-3 px-4 py-2 border-opacity-50"
                    style="font-size: 0.9rem; min-width: 100px;">
                    Cancel
                </button>
            </div>
        </div>
    </div>
    }
</div>
