<div class="p-4 bg-dark text-white min-vh-100" style="background-color: #141414 !important;">

    <div class="mb-4">
        <h2 class="fw-bold mb-1">Discover people</h2>
        <p class="text-secondary">Find and connect with people you might know</p>
    </div>

    <app-people-filter></app-people-filter>

    <div class="container-fluid py-4">
        <!-- row-cols-lg-4 ensures exactly 4 items per row on large screens -->
        <div class="row row-cols-1 row-cols-md-2 row-cols-lg-4 g-4">

            @for (user of usersForDiscover; track user) {
            <div class="col">
                <app-user-card [user]="user"></app-user-card>
            </div>
            }

        </div>
    </div>
</div>
