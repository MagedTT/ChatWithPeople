<div class="d-flex flex-row-reverse align-items-end gap-2 ms-auto" style="max-width: 70%;">
    <!-- Message Bubble -->
    <div class="bg-primary p-3 rounded-4 text-white shadow-sm" style="border-bottom-right-radius: 4px !important;">
        {{ message.content }}
    </div>

    <!-- Metadata: Time and Status SVG -->
    <div class="d-flex flex-column align-items-end">
        <!-- Seen/Sent SVG Icon -->
        <svg xmlns="http://w3.org" width="16" height="16" viewBox="0 0 16 16"
            [attr.fill]="true ? '#00D2FF' : '#6c757d'">
            <path
                d="M12.354 4.354a.5.5 0 0 0-.708-.708L5 10.293 1.854 7.146a.5.5 0 1 0-.708.708l3.5 3.5a.5.5 0 0 0 .708 0l7-7zm-4.208 7-.896-.897.707-.707.543.543 6.646-6.647a.5.5 0 0 1 .708.708l-7 7a.5.5 0 0 1-.708 0z" />
            <path d="m5.354 7.146.896.897-.707.707-.897-.896a.5.5 0 1 1 .708-.708z" />
        </svg>

        <small class="text-secondary" style="font-size: 0.7rem;">
            {{ message.createdAt | date: 'shortTime' }}
        </small>
    </div>
</div>
